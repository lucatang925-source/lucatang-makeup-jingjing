<!-- 
=====================================================
【页面主体结构 - 无需修改】
以下代码实现页面布局和交互功能
零代码基础用户无需修改此处
=====================================================
-->

<!-- 页面主容器 -->
<div class="page-container">
    
    <!-- ========== 模块1：顶部个人名片区 ========== -->
    <section class="profile-section" id="profile">
        <!-- 头像区域 -->
        <div class="avatar-wrapper">
            <!-- 头像图片，从配置读取 -->
            <img class="avatar-img" id="avatarImg" src="" alt="头像">
        </div>
        
        <!-- 姓名 -->
        <h1 class="profile-name" id="profileName"></h1>
        
        <!-- 职业标签 -->
        <div class="profile-tags" id="profileTags"></div>
        
        <!-- 所在城市 -->
        <div class="profile-city" id="profileCity"></div>
        
        <!-- 个人简介 -->
        <p class="profile-intro" id="profileIntro"></p>
    </section>
    
    <!-- ========== 模块2：化妆师简介区 ========== -->
    <section class="about-section" id="about">
        <h2 class="section-title" id="aboutTitle"></h2>
        <div class="about-content">
            <p class="about-text" id="aboutText"></p>
            <div class="about-features" id="aboutFeatures"></div>
        </div>
    </section>
    
    <!-- ========== 模块3：作品集展示区 ========== -->
    <section class="portfolio-section" id="portfolio">
        <!-- 区块标题 -->
        <h2 class="section-title">作品赏析</h2>
        
        <!-- 分类标签 -->
        <div class="portfolio-tabs" id="portfolioTabs">
            <button class="portfolio-tab active" data-category="wedding">婚纱妆造</button>
            <button class="portfolio-tab" data-category="xiuhu">秀禾妆造</button>
        </div>
        
        <!-- 婚纱妆造瀑布流 -->
        <div class="waterfall-container active" id="weddingContainer" data-category="wedding">
            <!-- 图片将通过JavaScript动态插入 -->
        </div>
        
        <!-- 秀禾妆造瀑布流 -->
        <div class="waterfall-container" id="xiuhuContainer" data-category="xiuhu">
            <!-- 图片将通过JavaScript动态插入 -->
        </div>
    </section>
    
    <!-- ========== 模块4：服务介绍区 ========== -->
    <section class="services-section" id="services">
        <!-- 服务内容 -->
        <div class="service-content">
            <h2 class="section-title" id="serviceTitle"></h2>
            <div class="service-grid" id="serviceGrid"></div>
        </div>
        
        <!-- 服务时间 -->
        <div class="schedule-content">
            <h3 class="subsection-title" id="scheduleTitle"></h3>
            <div class="schedule-list" id="scheduleList"></div>
            <p class="schedule-note" id="scheduleNote"></p>
        </div>
        
        <!-- 服务理念 -->
        <div class="philosophy-content">
            <h3 class="subsection-title" id="philosophyTitle"></h3>
            <p class="philosophy-text" id="philosophyText"></p>
        </div>
        
        <!-- 价目表 -->
        <div class="pricing-content">
            <h3 class="subsection-title" id="pricingTitle"></h3>
            <div class="pricing-list" id="pricingList"></div>
            <!-- 其他费用 -->
            <div class="extra-pricing" id="extraPricing">
                <h4 class="extra-title" id="extraTitle"></h4>
                <div class="extra-list" id="extraList"></div>
                <p class="extra-note" id="extraNote"></p>
            </div>
            <p class="pricing-note" id="pricingNote"></p>
        </div>
    </section>
    
    <!-- ========== 模块4：基础合规区 ========== -->
    <section class="footer-section" id="footer">
        <p class="copyright-text" id="copyrightText"></p>
        <p class="icp-text" id="icpText"></p>
    </section>
    
    <!-- 底部留白，防止被固定栏遮挡 -->
    <div class="bottom-spacer"></div>
</div>

<!-- ========== 模块5：联系方式固定悬浮栏 ========== -->
<div class="contact-bar" id="contactBar">
    <!-- 复制微信号按钮 -->
    <button class="contact-btn wechat-btn" id="wechatBtn">
        <span class="btn-icon">📋</span>
        <span class="btn-text" id="wechatBtnText"></span>
    </button>
    
    <!-- 拨打电话按钮 -->
    <a class="contact-btn phone-btn" id="phoneBtn" href="">
        <span class="btn-icon">📞</span>
        <span class="btn-text" id="phoneBtnText"></span>
    </a>
</div>

<!-- ========== 图片预览弹窗 ========== -->
<div class="lightbox" id="lightbox">
    <!-- 关闭按钮 -->
    <button class="lightbox-close" id="lightboxClose">&times;</button>
    
    <!-- 图片计数器 -->
    <div class="lightbox-counter" id="lightboxCounter">1 / 12</div>
    
    <!-- 图片容器 -->
    <div class="lightbox-container" id="lightboxContainer">
        <img class="lightbox-img" id="lightboxImg" src="" alt="预览">
    </div>
    
    <!-- 操作提示 -->
    <div class="lightbox-hint" id="lightboxHint">
        左右滑动切换 · 双指缩放 · 长按保存
    </div>
</div>

<!-- ========== Toast提示组件 ========== -->
<div class="toast" id="toast">
    <span class="toast-icon" id="toastIcon">✓</span>
    <span class="toast-message" id="toastMessage"></span>
</div>

<!-- 加载主脚本 -->
<script src="js/main.js"></script>

</body>
</html>
